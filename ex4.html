<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade04</title>
    <link rel="stylesheet" href="/ex4.css">
</head>

<body>
    <form>
        <img src="" alt="fundo">
        <h2>Cadastro usuário</h2>
        <label>
            
            <span>Nome</span>
            <input type="text" name="nome" required>
        </label>
        <label>
            <span>Email</span>
            <input type="email" name="email" required>
        </label>
        <label>
            <span>Nascimento</span>
            <input type="date" name="data_Nascimento">
        </label>
        <label>
            <span>Pais</span>
            <select name="paises">
                <option value="">Selecione</option>
            </select>
        </label>
        <label>
            <span>Idade</span>
            <div>
                <input type="number" name="idade">
                <span>DDD</span>
                <input maxlength="3" type="number" name="ddd">
                <span>Telefone</span>
                <input maxlength="9" type="number" name="tele">
            </div>
        </label>
        <button>Adicionar</button>
    </form>

</body>

</html>
