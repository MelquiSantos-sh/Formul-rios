<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade03</title>
    <link rel="stylesheet" href="/ex3.css">
</head>
<body>
    <form>
        <label>
            <span>Nome</span>
            <input  type="text" name="nome" required minlength="3">
        </label>
        <label>
            <span>Email</span>
            <input  placeholder="user@example.org" type="email" name="email">
        </label>
        <label>
            <span>Password</span>
            <input  type="password" name="senha" required minlength="6" maxlength="10">
        </label>
        
    </form>
    
</body>
</html>
